server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Main application
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Static assets with caching
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Agent avatars (bind-mounted from host)
    location /avatars/ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Use Docker's internal DNS resolver + public DNS fallback for external hosts
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bloodbank_upstream http://bloodbank:8682;
    set $ws_relay_upstream http://bloodbank-ws-relay:8683;
    set $candystore_upstream http://candystore:8080;
    set $plane_upstream https://plane.delo.sh;
    set $echobox_upstream http://echobox-ledger:18697;

    # Proxy API requests to Bloodbank
    location /api/bloodbank {
        rewrite ^/api/bloodbank/(.*) /$1 break;
        proxy_pass $bloodbank_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy event history queries to Candystore
    location /api/events {
        rewrite ^/api/events/(.*) /api/v1/events/$1 break;
        rewrite ^/api/events$ /api/v1/events break;
        proxy_pass $candystore_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket requests to Bloodbank WS Relay
    location /ws {
        proxy_pass $ws_relay_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Proxy Echobox Ledger API
    location /api/echobox/ {
        rewrite ^/api/echobox/(.*) /$1 break;
        proxy_pass $echobox_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Plane API proxy — proxies to plane.delo.sh with server-side API key
    location /api/plane/ {
        rewrite ^/api/plane/(.*) /$1 break;
        proxy_pass $plane_upstream;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host plane.delo.sh;
        proxy_set_header x-api-key PLANE_API_KEY_PLACEHOLDER;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
